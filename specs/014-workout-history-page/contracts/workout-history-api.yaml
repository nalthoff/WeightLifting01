openapi: 3.0.3
info:
  title: Workout History API
  version: 0.1.0
  description: Contracts for completing workouts and listing completed workout history entries.
paths:
  /api/workouts/{workoutId}/complete:
    post:
      summary: Complete one in-progress workout
      operationId: completeWorkout
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workout completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteWorkoutResponse'
        '404':
          description: Workout not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Workout cannot be completed in current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
  /api/workouts/history:
    get:
      summary: List completed workouts for current user
      operationId: listCompletedWorkouts
      responses:
        '200':
          description: Completed workout history returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutHistoryResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
components:
  schemas:
    WorkoutSessionSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - status
        - startedAtUtc
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [InProgress, Completed]
        label:
          type: string
          nullable: true
        startedAtUtc:
          type: string
          format: date-time
        completedAtUtc:
          type: string
          format: date-time
          nullable: true
    CompleteWorkoutResponse:
      type: object
      additionalProperties: false
      required:
        - workout
      properties:
        workout:
          $ref: '#/components/schemas/WorkoutSessionSummary'
    WorkoutHistoryItem:
      type: object
      additionalProperties: false
      required:
        - workoutId
        - label
        - completedAtUtc
      properties:
        workoutId:
          type: string
          format: uuid
        label:
          type: string
          description: Workout label or fallback value "Workout" when unset.
        completedAtUtc:
          type: string
          format: date-time
    WorkoutHistoryResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutHistoryItem'
    Problem:
      type: object
      additionalProperties: true
      properties:
        title:
          type: string
        status:
          type: integer
