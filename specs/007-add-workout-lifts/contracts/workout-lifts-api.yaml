openapi: 3.0.3
info:
  title: Workout Lift Entries API
  version: 0.1.0
  description: Contracts for adding and listing lifts in an in-progress workout.
paths:
  /api/workouts/{workoutId}/lifts:
    get:
      summary: List lift entries currently added to a workout
      operationId: listWorkoutLifts
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workout lift entries returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkoutLiftListResponse'
        '404':
          description: Workout not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
    post:
      summary: Add one lift to an in-progress workout
      operationId: addWorkoutLift
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWorkoutLiftRequest'
      responses:
        '201':
          description: Lift added to workout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddWorkoutLiftResponse'
        '404':
          description: Workout or lift not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Workout cannot accept lift addition in current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblem'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
components:
  schemas:
    AddWorkoutLiftRequest:
      type: object
      additionalProperties: false
      required:
        - liftId
      properties:
        liftId:
          type: string
          format: uuid
    WorkoutLiftEntry:
      type: object
      additionalProperties: false
      required:
        - id
        - workoutId
        - liftId
        - displayName
        - addedAtUtc
        - position
      properties:
        id:
          type: string
          format: uuid
        workoutId:
          type: string
          format: uuid
        liftId:
          type: string
          format: uuid
        displayName:
          type: string
        addedAtUtc:
          type: string
          format: date-time
        position:
          type: integer
          minimum: 1
    AddWorkoutLiftResponse:
      type: object
      additionalProperties: false
      required:
        - workoutLift
      properties:
        workoutLift:
          $ref: '#/components/schemas/WorkoutLiftEntry'
    WorkoutLiftListResponse:
      type: object
      additionalProperties: false
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutLiftEntry'
    Problem:
      type: object
      additionalProperties: true
      properties:
        title:
          type: string
        status:
          type: integer
    ValidationProblem:
      allOf:
        - $ref: '#/components/schemas/Problem'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
