openapi: 3.0.3
info:
  title: Workout Lift Reorder API
  version: 0.1.0
  description: Contract for persisting lift-entry order changes in an in-progress workout.
paths:
  /api/workouts/{workoutId}/lifts/reorder:
    put:
      summary: Persist ordered lift entries for an in-progress workout
      operationId: reorderWorkoutLifts
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderWorkoutLiftsRequest'
      responses:
        '200':
          description: Workout lift order persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReorderWorkoutLiftsResponse'
        '404':
          description: Workout or one/more workout-lift entries not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '409':
          description: Workout is not in a reorderable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblem'
        '422':
          description: Invalid reorder request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblem'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'

components:
  schemas:
    ReorderWorkoutLiftsRequest:
      type: object
      additionalProperties: false
      required:
        - orderedWorkoutLiftEntryIds
      properties:
        orderedWorkoutLiftEntryIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
          uniqueItems: true
    ReorderWorkoutLiftsResponse:
      type: object
      additionalProperties: false
      required:
        - workoutId
        - items
      properties:
        workoutId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkoutLiftEntry'
    WorkoutLiftEntry:
      type: object
      additionalProperties: false
      required:
        - id
        - workoutId
        - liftId
        - displayName
        - addedAtUtc
        - position
      properties:
        id:
          type: string
          format: uuid
        workoutId:
          type: string
          format: uuid
        liftId:
          type: string
          format: uuid
        displayName:
          type: string
        addedAtUtc:
          type: string
          format: date-time
        position:
          type: integer
          minimum: 1
    Problem:
      type: object
      additionalProperties: true
      properties:
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
    ValidationProblem:
      allOf:
        - $ref: '#/components/schemas/Problem'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
