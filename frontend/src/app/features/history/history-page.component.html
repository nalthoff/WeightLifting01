<section class="history-page">
  <mat-card class="history-page__panel" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Workout History</mat-card-title>
      <mat-card-subtitle>Your completed workouts.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="history-page__content">
      <p *ngIf="isLoading()" class="history-page__feedback history-page__feedback--info">Loading workout history...</p>

      <p *ngIf="loadError()" class="history-page__feedback history-page__feedback--error">
        {{ loadError() }}
      </p>

      <p
        *ngIf="
          !isLoading() &&
          !loadError() &&
          completedWorkouts().length === 0
        "
        class="history-page__feedback history-page__feedback--info"
      >
        No completed workouts yet.
      </p>

      <ul *ngIf="completedWorkouts().length > 0" class="history-page__list" data-testid="history-list">
        <li *ngFor="let workout of completedWorkouts(); trackBy: trackWorkout" class="history-page__list-item">
          <div class="history-page__item-label" data-testid="history-item-label">
            {{ getDisplayLabel(workout) }}
          </div>
          <div class="history-page__item-date" data-testid="history-item-date">
            Completed {{ workout.completedAtUtc | date: 'medium' }}
          </div>
        </li>
      </ul>
    </mat-card-content>

    <mat-card-actions>
      <a mat-button routerLink="/">Back to home</a>
    </mat-card-actions>
  </mat-card>
</section>
