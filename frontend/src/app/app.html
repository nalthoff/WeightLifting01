<main class="app-shell">
  <header class="app-shell__header">
    <mat-toolbar class="app-shell__toolbar">
      <span class="app-shell__brand">
        <mat-icon>fitness_center</mat-icon>
        <span>WeightLifting01</span>
      </span>

      <span class="app-shell__spacer"></span>

      <nav class="app-shell__nav" aria-label="Primary navigation">
        <a
          mat-button
          class="app-shell__nav-link"
          data-testid="home-nav-link"
          routerLink="/"
          routerLinkActive="app-shell__nav-link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Home
        </a>

        <a
          mat-button
          class="app-shell__nav-link"
          data-testid="settings-nav-link"
          routerLink="/settings/lifts"
          routerLinkActive="app-shell__nav-link--active"
          aria-label="Settings - Lifts"
        >
          Settings
        </a>
      </nav>
    </mat-toolbar>
  </header>

  <section class="app-shell__content">
    <router-outlet></router-outlet>
  </section>
</main>
