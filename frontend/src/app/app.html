<main class="app-shell">
  <header class="app-shell__header">
    <mat-toolbar class="app-shell__toolbar">
      <a
        class="app-shell__brand app-shell__brand-link"
        data-testid="brand-home-link"
        routerLink="/"
        aria-label="Go to home screen"
      >
        <mat-icon>fitness_center</mat-icon>
        <span>WeightLifting01</span>
      </a>

      <span class="app-shell__spacer"></span>

      <button
        mat-icon-button
        class="app-shell__menu-trigger"
        aria-label="Open navigation menu"
        [matMenuTriggerFor]="primaryNavigationMenu"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <nav class="app-shell__nav" aria-label="Primary navigation">
        <a
          mat-button
          class="app-shell__nav-link"
          data-testid="home-nav-link"
          routerLink="/"
          routerLinkActive="app-shell__nav-link--active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Home
        </a>

        <a
          mat-button
          class="app-shell__nav-link"
          data-testid="history-nav-link"
          routerLink="/history"
          routerLinkActive="app-shell__nav-link--active"
        >
          History
        </a>

        <a
          mat-button
          class="app-shell__nav-link"
          data-testid="settings-nav-link"
          routerLink="/settings/lifts"
          routerLinkActive="app-shell__nav-link--active"
          aria-label="Settings - Lifts"
        >
          Settings
        </a>
      </nav>

      <mat-menu #primaryNavigationMenu="matMenu" xPosition="before">
        <a
          mat-menu-item
          data-testid="home-nav-link-mobile"
          routerLink="/"
        >
          Home
        </a>
        <a
          mat-menu-item
          data-testid="history-nav-link-mobile"
          routerLink="/history"
        >
          History
        </a>
        <a
          mat-menu-item
          data-testid="settings-nav-link-mobile"
          routerLink="/settings/lifts"
        >
          Settings
        </a>
      </mat-menu>
    </mat-toolbar>
  </header>

  <section class="app-shell__content">
    <router-outlet></router-outlet>
  </section>
</main>
